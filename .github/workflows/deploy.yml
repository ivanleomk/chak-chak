name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Staging: deploy Convex (dev) + Cloudflare Workers (staging)
      - name: Deploy Convex (dev)
        if: github.ref == 'refs/heads/dev'
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_DEV }}

      - name: Build (staging)
        if: github.ref == 'refs/heads/dev'
        run: npm run build

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/dev'
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Production: deploy Convex (prod) + Cloudflare Workers (prod)
      - name: Deploy Convex (prod)
        if: github.ref == 'refs/heads/main'
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
